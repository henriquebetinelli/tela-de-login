<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
</head>
<body>
    <main class="container min-vh-100 d-flex align-items-center justify-content-center">
        <section class="row w-100 justify-content-center">
            <div class="w-50">
                <div id="mensagem" class="alert d-none mb-3" role="alert"></div>
                <div class="card login-card shadow-sm border-0 rounded-4 p-4">
                    <div class="card-body">
                        <h1 id="titulo" class="text-center fw-bold mb-4 login-title">Login</h1>
                        <form id="formLogin">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Email</label>
                                <input type="email" class="form-control form-control-lg rounded-3" id="email" placeholder="Digite seu email"/>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-medium">Senha</label>
                                <input type="password" class="form-control form-control-lg rounded-3" id="senha" placeholder="Digite sua senha"/>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-semibold">
                                    Entrar
                                </button>
                            </div>
                            <p class="text-center mb-0 text-muted small">
                                <a href="#" id="toggle" class="link-primary fw-medium text-decoration-none">
                                Não tem conta? Cadastre-se!
                                </a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
